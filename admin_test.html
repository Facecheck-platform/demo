<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FaceCheck by Kama</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh;padding:16px}
  h1{text-align:center;font-size:1.4rem;font-weight:700;margin-bottom:18hpx;color:#38bdf8}
  .logo{text-align:center;font-size:2.5rem;margin-bottom:6px}
  .card{background:#1e293b;border-radius:16px;padding:20px;margin-bottom:16px;border:1px solid #334155}
  label{display:block;font-size:.85rem;color:#94a3b8;margin-bottom:6px;font-weight:500}
  input,select{width:100%;padding:12px 14px;background:#0f172a;border:1.5px solid #334155;border-radius:10px;color:#f1f5f9;font-size:1rem;outline:none;transition:border-color .2s}
  input:focus,select:focus{border-color:#38bdf8}
  select option{background:#1e293b}
  .field{margin-bottom:14px}
  #video{width:100%;border-radius:12px;background:#000;display:block;max-height:280px;object-fit:cover}
  #canvas{display:none}
  .btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px}
  .btn-cam{background:#0ea5e9;color:#fff}
  .btn-cam:hover{background:#0284c7}
  .btn-flip{background:#475569;color:#fff;margin-top:6px;font-size:.9rem;padding:10px}
  .btn-reg{background:#10b981;color:#fff}
  .btn-reg:hover{background:#059669}
  .btn-reg:disabled{background:#334155;color:#64748b;cursor:not-allowed}
  #preview{width:100%;border-radius:12px;display:none;margin-top:10px}
  #msg{margin-top:14px;padding:14px;border-radius:10px;font-size:.95rem;font-weight:600;display:none;text-align:center}
  .ok{background:#064e3b;color:#34d399;border:1px solid #10b981}
  .err{background:#450a0a;color:#f87171;border:1px solid #ef4444}
  .warn{background:#431407;color:#fdba74;border:1px solid #f97316}
  .gps-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:.8rem;font-weight:600;margin-top:8px}
  .gps-ok{background:#064e3b;color:#34d399}
  .gps-err{background:#450a0a;color:#f87171}
  .gps-wait{background:#1e3a5f;color:#93c5fd}
  .spinner{display:inline-block;width:18px;height:18px;border:3px solid #334155;border-top-color:#38bdf8;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
  .zone-tag{font-size:.75rem;color:#64748b;margin-left:4px}

/* FaceCheck branding */
.brand { display: flex; flex-direction: column; line-height: 1.1; text-align:center;}
.brand-name { font-size: 18px; font-weight: 700; color: #e2e8f0; }
.brand-by { font-size: 10px; color: #94a3b8; letter-spacing: 1px; text-transform: uppercase; }


    .admin-title{text-align:center;font-size:2rem;font-weight:700;color:#e2e8f0;margin-bottom:16px;letter-spacing:0.3px}
    .admin-title em{color:#38bdf8;font-style:normal}
.admin-subtitle{text-align:center;font-size:1rem;color:#94a3b8;margin-bottom:10px;font-weight:500;letter-spacing:0.5px}

  .cam-locked{opacity:.4;pointer-events:none;user-select:none}
</style>
</head>
<body>
<div class="admin-title"><em>FACECHECK DEMO</em></div>
<div class="admin-subtitle">Registro de Empleado</div>
<div class="brand"><span class="brand-name">FaceCheck</span><span class="brand-by">by Kama</span></div>

<div class="card">
  <div class="field">
    <label>DNI del empleado *</label>
    <input type="text" id="dni" placeholder="Ej: 38521744" inputmode="numeric" maxlength="10" onblur="checkDni()" value="26656135">
  <div id="dniStatus" style="display:none;margin-top:8px;padding:10px 14px;border-radius:8px;font-size:.85rem;font-weight:600"></div>
  </div>
  <div class="field">
    <label>Nombre completo *</label>
    <input type="text" id="nombre" placeholder="Ej: María López" autocomplete="off">
  </div>
  <div class="field">
    <label>Salón *</label>
    <select id="salon">
        <option value="">Seleccionar sede...</option>
        <option value="Sede Centro">Sede Centro</option>
        <option value="Sede Palermo">Sede Palermo</option>
        <option value="Sede San Telmo">Sede San Telmo</option>
        <option value="Sede Belgrano">Sede Belgrano</option>
        <option value="Sede Caballito">Sede Caballito</option>
      </select>
  </div>
</div>
h
<div class="card">
  <label>Foto del empleado *</label>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <img id="preview" alt="Foto capturada">
  <button class="btn btn-cam" onclick="tomarFoto()">📷 Tomar foto</button>
  <button class="btn btn-flip" onclick="flipCam()">🔄 Cambiar cámara</button>
</div>

<button class="btn btn-reg" id="btnReg" onclick="registrar()" disabled>✅ Registrar empleado</button>
<div id="msg"></div>

<script>
const API_URL   = 'https://bq5vl6isk5v26ebokhtrrdo6nq0gvdhs.lambda-url.us-east-2.on.aws';
const CLIENT_ID = 'test-client';

var stream = null, facing = 'user', fotoB64 = null, dniValidado = false;

// === MÓDULO B — Validación de DNI ===
async function checkDni() {
  var dni = document.getElementById('dni').value.trim();
  var st  = document.getElementById('dniStatus');
  if (!dni || dni.length < 6) { dniValidado = false; actualizarBoton(); return; }
  st.style.display = 'block';
  st.style.background = '#1e293b';
  st.style.color = '#94908a';
  st.textContent = '🔍 Verificando DNI...';
  dniValidado = false;
  actualizarBoton();
  try {
    var r = await fetch(API_URL + '/empleados/validar?clientId=' + encodeURIComponent(CLIENT_ID) + '&dni=' + encodeURIComponent(dni));
    var d = await r.json();
    if (!d.ok) throw new Error(d.error || 'Error en servidor');
    if (!d.encontrado) {
      st.style.background = '#450a0a';
      st.style.color = '#fca5a5';
      st.textContent = '✗ DNI no encontrado en el sistema. Solicitá a RRHH que lo registre.';
      dniValidado = false;
    } else if (d.yaRegistrado) {
      st.style.background = '#422006';
      st.style.color = '#fdba74';
      st.innerHTML = '⚠ Este empleado ya tiene rostro registrado. ¿Querés actualizarlo?<br><button onclick="confirmarUpdate()" style="margin-top:6px;padding:4px 12px;border-radius:6px;background:#f97316;color:white;border:none;cursor:pointer;font-size:.8rem">Sí, actualizar</button>';
      if (d.datos) { document.getElementById('nombre').value = d.datos.nombre || ''; }
      dniValidado = false;
    } else {
      st.style.background = '#052e16';
      st.style.color = '#86efac';
      st.textContent = '✓ Empleado encontrado. Podés continuar con el registro.';
      if (d.datos) { document.getElementById('nombre').value = d.datos.nombre || ''; }
      dniValidado = true;
    }
  } catch(e) {
    st.style.background = '#1e293b';
    st.style.color = '#f87171';
    st.textContent = '⚠ Error al verificar el DNI. Revisá la conexión.';
    dniValidado = false;
  }
  actualizarBoton();
}

function confirmarUpdate() {
  dniValidado = true;
  var st = document.getElementById('dniStatus');
  st.style.background = '#052e16';
  st.style.color = '#86efac';
  st.textContent = '✓ Actualización confirmada. Tomá la nueva foto.';
  actualizarBoton();
}


async function iniciarCam(f) {
  if (stream) stream.getTracks().forEach(t => t.stop());
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: f, width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    document.getElementById('video').srcObject = stream;
    document.getElementById('video').style.display = 'block';
    document.getElementById('preview').style.display = 'none';
    fotoB64 = null;
    actualizarBoton();
  } catch(e) {
    mostrar('No se pudo acceder a la cámara: ' + e.message, 'err');
  }
}

function flipCam() {
  facing = facing === 'user' ? 'environment' : 'user';
  iniciarCam(facing);
}

function tomarFoto() {
  var video = document.getElementById('video');
  var canvas = document.getElementById('canvas');
  canvas.width  = video.videoWidth  || 640;
  canvas.height = video.videoHeight || 480;
  canvas.getContext('2d').drawImage(video, 0, 0);
  var dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  fotoB64 = dataUrl.split(',')[1];
  var preview = document.getElementById('preview');
  preview.src = dataUrl;
  preview.style.display = 'block';
  if (stream) stream.getTracks().forEach(t => t.stop());
  document.getElementById('video').style.display = 'none';
  actualizarBoton();
}

function actualizarBoton() {
  var dni    = document.getElementById('dni').value.trim();
  var nombre = document.getElementById('nombre').value.trim();
  var salon  = document.getElementById('salon').value;
  document.getElementById('btnReg').disabled = !(dniValidado && dni && nombre && salon && fotoB64);
}

['dni','nombre','salon'].forEach(id => {
  document.getElementById(id).addEventListener('input', actualizarBoton);
});

async function registrar() {
  var dni    = document.getElementById('dni').value.trim();
  var nombre = document.getElementById('nombre').value.trim();
  var salon  = document.getElementById('salon').value;
  var btn    = document.getElementById('btnReg');

  if (!dniValidado || !dni || !nombre || !salon || !fotoB64) {
    mostrar('Completá todos los campos y tomá una foto', 'warn');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Registrando...';
  mostrar('', '');

  try {
    var res = await fetch(API_URL + '/registrar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ clientId: CLIENT_ID, dni: dni, nombre: nombre, salon: salon, imageBase64: fotoB64 })
    });
    var data = await res.json();
    if (!res.ok) { mostrar('❌ ' + (data.Message || data.error || 'Error ' + res.status), 'err'); } else if (data.ok) {
      mostrar('✅ ' + nombre + ' registrado correctamente en ' + salon + '\nDNI: ' + dni + '\nFaceId: ' + data.employeeId, 'ok');
      console.log('Lambda response:', JSON.stringify(data));
      var faceId  = data.faceId  || data.employeeId || '';
      var fotoUrl = data.foto_url || '';
      fetch(API_URL+'/empleados/nuevo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:CLIENT_ID,dni:dni,nombre:nombre,sector:salon,faceId:faceId,fotoUrl:fotoUrl})}).catch(function(){});
      document.getElementById('dni').value   = '';
      document.getElementById('nombre').value = '';
      document.getElementById('salon').value  = '';
      fotoB64 = null;
      document.getElementById('preview').style.display = 'none';
      iniciarCam(facing);
    } else {
      mostrar('❌ ' + (data.error || 'Error desconocido'), 'err');
    }
  } catch(e) {
    mostrar('❌ Error de conexión: ' + e.message, 'err');
  }

  btn.disabled = false;
  btn.innerHTML = '✅ Registrar empleado';
  actualizarBoton();
}

function mostrar(txt, tipo) {
  var el = document.getElementById('msg');
  if (!txt) { el.style.display = 'none'; return; }
  el.textContent = txt;
  el.className = tipo;
  el.style.display = 'block';
}

iniciarCam(facing);
</script>
</body>
</html>
