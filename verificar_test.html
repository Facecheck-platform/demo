<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FaceCheck Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px}
.logo{text-align:center;margin-bottom:4px}
h1{font-size:1.3rem;font-weight:700;color:#38bdf8;text-align:center;margin-bottom:8px}
.salon-tag{text-align:center;font-size:1rem;color:#f1f5f9;margin-bottom:12px;padding:8px 20px;background:#1e3a5f;border-radius:20px;display:inline-block;font-weight:600}
.center{text-align:center;width:100%}
.card{background:#1e293b;border-radius:16px;padding:20px;width:100%;max-width:420px;border:1px solid #334155;margin-bottom:14px}
.cam-placeholder{width:100%;border-radius:12px;background:#0f172a;min-height:220px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px dashed #334155;margin-bottom:8px;-webkit-tap-highlight-color:transparent}
.cam-placeholder:active{border-color:#6366f1}
#video{width:100%;border-radius:12px;background:#000;display:none;max-height:300px;object-fit:cover;margin-bottom:8px}
#canvas{display:none}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px}
.btn-scan{background:#6366f1;color:#fff}
.btn-scan:disabled{background:#334155;color:#64748b;cursor:not-allowed}
.tipo-btns{display:flex;gap:10px;margin-bottom:14px}
.tipo-btn{flex:1;padding:11px;border:2px solid #334155;border-radius:10px;background:transparent;color:#94a3b8;font-weight:700;cursor:pointer;transition:all .2s;font-size:.95rem}
.tipo-btn.active-entrada{border-color:#10b981;color:#34d399;background:#064e3b}
.tipo-btn.active-salida{border-color:#ef4444;color:#f87171;background:#450a0a}
.gps-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 14px;border-radius:20px;font-size:.82rem;font-weight:600;margin-bottom:12px;width:fit-content;margin-left:auto;margin-right:auto}
.gps-wait{background:#1e3a5f;color:#93c5fd}
.gps-ok{background:#064e3b;color:#34d399}
.gps-err{background:#450a0a;color:#f87171}
.gps-warn{background:#431407;color:#fdba74}
.result{width:100%;max-width:420px;border-radius:16px;padding:28px;text-align:center;display:none;margin-bottom:14px}
.result-ok{background:#064e3b;border:2px solid #10b981}
.result-err{background:#450a0a;border:2px solid #ef4444}
.result-warn{background:#431407;border:2px solid #f97316}
.result-icon{font-size:4rem;margin-bottom:12px}
.result-name{font-size:1.5rem;font-weight:800;margin-bottom:6px;color:#f1f5f9}
.result-detail{font-size:.88rem;color:#94a3b8;line-height:1.7}
.chip{display:inline-block;background:rgba(255,255,255,.1);border-radius:20px;padding:3px 12px;font-size:.82rem;margin-top:6px}
.spinner{display:inline-block;width:22px;height:22px;border:3px solid #334155;border-top-color:#6366f1;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* FaceCheck branding */
.brand { display: flex; flex-direction: column; line-height: 1.1; }
.brand-name { font-size: 18px; font-weight: 700; color: #e2e8f0; }
.brand-by { font-size: 10px; color: #94a3b8; letter-spacing: 1px; text-transform: uppercase; }
</style>
</head>
<body>
<div class="logo">
<p style="font-size:2rem;font-weight:800;color:#fff;letter-spacing:6px;text-align:center;margin:0">FACECHECK DEMO</p>
</div>
<div class="brand"><span class="brand-name">FaceCheck</span><span class="brand-by">by Kama</span></div>
<div class="center"><span class="salon-tag" id="salonLabel">Detectando salon...</span></div>
<div class="center" style="margin-bottom:12px">
<span class="gps-bar gps-wait" id="gpsBar">Obteniendo ubicacion...</span>
</div>
<div class="card" id="mainCard" style="max-width:420px;width:100%">
<div class="tipo-btns">
<button class="tipo-btn active-entrada" id="btnE" onclick="setTipo('entrada')">&#10003; Entrada</button>
<button class="tipo-btn" id="btnS" onclick="setTipo('salida')">&#10007; Salida</button>
</div>
<div class="cam-placeholder" id="camPlaceholder" onclick="activarCam()">
<div style="text-align:center;color:#94a3b8">
<svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 10px;display:block"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
<div style="font-size:.95rem;font-weight:600">Toca para activar la camara</div>
</div>
</div>
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<button class="btn btn-scan" id="btnScan" onclick="escanear()">Verificar identidad</button>
</div>
<div class="result" id="resultBox">
<div class="result-icon" id="resIcon"></div>
<div class="result-name" id="resName"></div>
<div class="result-detail" id="resDetail"></div>
<button class="btn btn-scan" onclick="reiniciar()" style="margin-top:20px">Siguiente</button>
</div>
<script>
var API_URL    = 'https://bq5vl6isk5v26ebokhtrrdo6nq0gvdhs.lambda-url.us-east-2.on.aws';
var CLIENT_ID  = 'test-client';
var MAX_DIST = 5000; // demo: 5km
var SALONES = {
  "Sede Centro":    { "lat": -34.6083, "lng": -58.3712 },
  "Sede Palermo":   { "lat": -34.5885, "lng": -58.4316 },
  "Sede San Telmo": { "lat": -34.6218, "lng": -58.3694 },
  "Sede Belgrano":  { "lat": -34.5623, "lng": -58.4575 },
  "Sede Caballito": { "lat": -34.6175, "lng": -58.4411 }
};
var params = new URLSearchParams(window.location.search);
var salonForzado = decodeURIComponent(params.get('salon') || '');
var salonNom = salonForzado;
var userLat = null, userLng = null, gpsOk = false;
var tipo = 'entrada'; var distanciaMetros = 0;
var stream = null, facing = 'user', camActive = false;
if (salonForzado) document.getElementById('salonLabel').textContent = salonForzado;
obtenerGPS();
function setTipo(t) {
  tipo = t;
  document.getElementById('btnE').className = 'tipo-btn'+(t==='entrada'?' active-entrada':'');
  document.getElementById('btnS').className = 'tipo-btn'+(t==='salida'?' active-salida':'');
}
function obtenerGPS() {
  if (!navigator.geolocation) { setGPS('err','GPS no disponible'); document.getElementById('salonLabel').textContent='Sin GPS'; gpsOk=false; return; }
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      userLat = pos.coords.latitude; userLng = pos.coords.longitude;
      if (salonForzado && SALONES[salonForzado]) {
        var d = haversine(userLat,userLng,SALONES[salonForzado].lat,SALONES[salonForzado].lng);
        if (d <= MAX_DIST) { setGPS('ok','Ubicacion OK - '+Math.round(d)+'m'); distanciaMetros=Math.round(d); gpsOk=true; }
        else { setGPS('err','A '+Math.round(d)+'m del salon (max '+MAX_DIST+'m)'); gpsOk=false; }
        return;
      }
      var minDist=Infinity, closest=null;
      for (var n in SALONES) { var d=haversine(userLat,userLng,SALONES[n].lat,SALONES[n].lng); if (d<minDist){minDist=d;closest=n;} }
      if (closest && minDist<=MAX_DIST) { salonNom=closest; document.getElementById('salonLabel').textContent=salonNom; setGPS('ok','Salon detectado - '+Math.round(minDist)+'m'); distanciaMetros=Math.round(minDist); gpsOk=true; }
      else { var msg=closest ? Math.round(minDist)+'m del mas cercano ('+closest+')' : 'ubicacion desconocida'; setGPS('err','Sin salon en rango - '+msg); document.getElementById('salonLabel').textContent='Fuera de salon'; gpsOk=false; }
    },
    function() { setGPS('err','GPS denegado'); document.getElementById('salonLabel').textContent='Sin GPS'; gpsOk=false; },
    {enableHighAccuracy:true,timeout:10000,maximumAge:0}
  );
}
function setGPS(tipo,txt) { var el=document.getElementById('gpsBar'); el.className='gps-bar gps-'+tipo; el.textContent=txt; }
function haversine(lat1,lng1,lat2,lng2) {
  var R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return 2*R*Math.asin(Math.sqrt(a));
}
function activarCam() {
  document.getElementById('camPlaceholder').style.display='none';
  document.getElementById('video').style.display='block';
  iniciarCam(facing);
}
function iniciarCam(f) {
  if (stream) { stream.getTracks().forEach(function(t){ t.stop(); }); stream=null; }
  var vid=document.getElementById('video');
  if (!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia) { mostrarCamError('El navegador no soporta camara. Usa Chrome o Safari actualizado.'); return; }
  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:f}}})
    .then(function(s){ stream=s; vid.srcObject=s; camActive=true; var p=vid.play(); if(p!==undefined) p.catch(function(){}); })
    .catch(function(err) {
      navigator.mediaDevices.getUserMedia({video:true})
        .then(function(s){ stream=s; vid.srcObject=s; camActive=true; var p=vid.play(); if(p!==undefined) p.catch(function(){}); })
        .catch(function(err2){ mostrarCamError('No se pudo acceder a la camara: '+err2.message); });
    });
}
function mostrarCamError(msg) {
  var ph=document.getElementById('camPlaceholder');
  ph.style.display='flex';
  ph.innerHTML='<div style="text-align:center;color:#f87171;padding:16px"><div style="font-size:2rem">X</div><div style="font-size:.85rem;margin-top:8px">'+msg+'</div><div style="font-size:.8rem;margin-top:8px;color:#94a3b8">Toca para reintentar</div></div>';
  document.getElementById('video').style.display='none';
}
function flipCam() { facing=facing==='user'?'environment':'user'; iniciarCam(facing); }
async function escanear() {
  if (!gpsOk) { mostrarResult('warn','Fuera de rango','Debes estar a menos de '+MAX_DIST+'m de un salon para marcar asistencia.'); return; }
  var btn=document.getElementById('btnScan');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Verificando...';
  if (!camActive) { activarCam(); await new Promise(function(r){ setTimeout(r,2000); }); }
  var video=document.getElementById('video'), canvas=document.getElementById('canvas');
  canvas.width=video.videoWidth||640; canvas.height=video.videoHeight||480;
  canvas.getContext('2d').drawImage(video,0,0);
  var b64=canvas.toDataURL('image/jpeg',0.85).split(',')[1];
  try {
    var res=await fetch(API_URL+'/verificar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({imageBase64:b64, clientId:CLIENT_ID})});
    var data=await res.json();
    if (data.ok) {
      var sim=Math.round(data.similarity||0);
      var sectorOk=true;
              var estadoRes = await fetch(API_URL+'/asistencia/estado-hoy?clientId='+encodeURIComponent(CLIENT_ID)+'&dni='+encodeURIComponent(data.dni));
              var estadoData = await estadoRes.json();
              var ultimoTipo = estadoData.ok
                ? estadoData.ultimoTipo : null;
              if (ultimoTipo === 'SALIDA') {
                          mostrarResult('warn', data.nombre,
                                                    'Ya registraste tu salida hoy.');
                          btn.disabled = false;
                          btn.innerHTML = 'Verificar identidad';
                          return;
              }
              if (ultimoTipo === 'ENTRADA') {
                          setTipo('salida');
                          document.getElementById('btnE').disabled = true;
                          document.getElementById('btnE').style.opacity = '0.4';
                          document.getElementById('btnS').disabled = false;
                          document.getElementById('btnS').style.opacity = '1';
              } else {
                          setTipo('entrada');
                          document.getElementById('btnE').disabled = false;
                          document.getElementById('btnE').style.opacity = '1';
                          document.getElementById('btnS').disabled = true;
                          document.getElementById('btnS').style.opacity = '0.4';
              }
      try {
        var secRes=await fetch(API_URL+'/empleados/sector?clientId='+encodeURIComponent(CLIENT_ID)+'&dni='+encodeURIComponent(data.dni));
        var secData=await secRes.json();
        if (secData.ok && secData.sector && secData.sector!==salonNom) {
          mostrarResult('warn',data.nombre,'No estas asignado a este salon. Tu salon es: '+secData.sector);
          sectorOk=false;
        }
      } catch(e2) { /* si falla consulta sector, se permite el registro */ }
      if (sectorOk) {
        mostrarResult('ok',data.nombre,(tipo==='entrada'?'ENTRADA registrada':'SALIDA registrada')+'<br>'+salonNom+'<br><span class="chip">Confianza: '+sim+'%</span><span class="chip" style="margin-left:6px">DNI: '+data.dni+'</span>');
        fetch(API_URL+'/asistencia/registrar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:CLIENT_ID,dni:data.dni,nombre:data.nombre,salon:salonNom,tipo:tipo.toUpperCase(),confianza:sim,distancia:distanciaMetros+'m'})}).catch(function(){});
      }
    } else { mostrarResult('err','No reconocido',data.error||'Rostro no encontrado. Pedi al administrador que te registre primero.'); }
  } catch(e) { mostrarResult('err','Error de conexion',e.message); }
  btn.disabled=false; btn.innerHTML='Verificar identidad';
}
function mostrarResult(tipo,name,detail) {
  var icons={ok:'OK',err:'X',warn:'!'};
  var box=document.getElementById('resultBox');
  box.className='result result-'+tipo; box.style.display='block';
  document.getElementById('resIcon').textContent=icons[tipo]||'';
  document.getElementById('resName').textContent=name;
  document.getElementById('resDetail').innerHTML=detail;
  document.getElementById('mainCard').style.display='none';
  document.getElementById('gpsBar').style.display='none';
}
function reiniciar() {
  document.getElementById('resultBox').style.display='none';
  document.getElementById('mainCard').style.display='block';
  document.getElementById('gpsBar').style.display='';
  document.getElementById('btnScan').innerHTML='Verificar identidad';
}
</script>
</body>
</html>
